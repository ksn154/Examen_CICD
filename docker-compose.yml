version: '3.8'

services:

  db:
    image: mysql:8.0
    container_name: mysql_container

    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: Myapp_base

    ports:
      - "3306:3306"

    volumes:
      - mysql_data:/var/lib/mysql

  web:
    build: .

    container_name: flask_container

    ports:
      - "5000:5000"

    environment:
      DB_HOST: db
      DB_USER: root
      DB_PASSWORD: root
      DB_NAME: Myapp_base

    depends_on:
      - db

volumes:
  mysql_data: